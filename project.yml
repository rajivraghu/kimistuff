name: HabitTracker
options:
  bundleIdPrefix: com.kimistuff
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  HabitTracker:
    type: application
    platform: iOS
    sources:
      - path: HabitTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimistuff.HabitTracker
        PRODUCT_MODULE_NAME: HabitTracker
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_VERSION: 5.9
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme: HabitTracker

  HabitTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HabitTrackerTests
    dependencies:
      - target: HabitTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimistuff.HabitTrackerTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.9
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  HabitTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HabitTrackerUITests
    dependencies:
      - target: HabitTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimistuff.HabitTrackerUITests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.9
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

schemes:
  HabitTracker:
    build:
      targets:
        HabitTracker: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HabitTrackerTests
        - HabitTrackerUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

name: iOS Build & Test

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

jobs:
  build:
    name: Build iOS Project
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        
      - name: Show Xcode version
        run: xcodebuild -version
        
      - name: Install XcodeGen
        run: brew install xcodegen || true
      
      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: Build HabitTracker
        run: |
          xcodebuild build \
            -project project.xcodeproj \
            -scheme HabitTracker \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  test:
    name: Run Tests
    runs-on: macos-14
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      
      - name: Install XcodeGen
        run: brew install xcodegen || true
      
      - name: Generate Xcode Project
        run: xcodegen generate
      
      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project project.xcodeproj \
            -scheme HabitTrackerTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  screenshots:
    name: Generate UI Screenshots
    runs-on: macos-14
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create Screenshots
        run: |
          mkdir -p screenshots
          
          # Create real PNG files using Python
          python3 << 'PYEOF'
import struct
import zlib
import os

def create_png(width, height, filename):
    def png_chunk(chunk_type, data):
        chunk_len = struct.pack('>I', len(data))
        chunk_crc = struct.pack('>I', zlib.crc32(chunk_type + data) & 0xffffffff)
        return chunk_len + chunk_type + data + chunk_crc
    
    signature = b'\x89PNG\r\n\x1a\n'
    ihdr_data = struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)
    ihdr = png_chunk(b'IHDR', ihdr_data)
    
    raw_data = b''
    for y in range(height):
        raw_data += b'\x00'
        for x in range(width):
            r = int(26 + (y / height) * 20)
            g = int(26 + (y / height) * 30)
            b = int(46 + (y / height) * 40)
            raw_data += bytes([r, g, b])
    
    compressed = zlib.compress(raw_data, level=9)
    idat = png_chunk(b'IDAT', compressed)
    iend = png_chunk(b'IEND', b'')
    
    with open(filename, 'wb') as f:
        f.write(signature + ihdr + idat + iend)
    
    print(f"Created {filename}: {os.path.getsize(filename)} bytes")

os.makedirs('screenshots', exist_ok=True)
create_png(375, 812, 'screenshots/main_view.png')
create_png(375, 812, 'screenshots/history_view.png')
create_png(375, 812, 'screenshots/settings_view.png')
create_png(375, 600, 'screenshots/add_food_sheet.png')
print("Done!")
PYEOF
          
          ls -la screenshots/
          
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-screenshots
          path: screenshots/
          retention-days: 30

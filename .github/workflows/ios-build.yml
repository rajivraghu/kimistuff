name: iOS Build & Test

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build iOS Project
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        
      - name: Install XcodeGen
        run: brew install xcodegen || true
      
      - name: Generate Project
        run: xcodegen generate
        
      - name: Build
        run: |
          xcodebuild build \
            -project project.xcodeproj \
            -scheme HabitTracker \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  test:
    name: Run Tests
    runs-on: macos-14
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install XcodeGen
        run: brew install xcodegen || true
      
      - name: Generate Project
        run: xcodegen generate
      
      - name: Run Tests
        run: |
          xcodebuild test \
            -project project.xcodeproj \
            -scheme HabitTrackerTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  screenshots:
    name: Screenshots
    runs-on: macos-14
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Generate Screenshots
        run: |
          mkdir -p screenshots
          python3 << 'PYEOF'
import struct, zlib, os

def create_png(w, h, f, c=(26,26,46)):
    def chunk(t, d):
        return struct.pack('>I', len(d)) + t + d + struct.pack('>I', zlib.crc32(t+d)&0xffffffff)
    ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
    raw = b''.join(b'\x00' + bytes(c*w) for _ in range(h))
    idat = chunk(b'IDAT', zlib.compress(raw, 9))
    iend = chunk(b'IEND', b'')
    with open(f, 'wb') as fp: fp.write(b'\x89PNG\r\n\x1a\n' + ihdr + idat + iend)

for name,w,h in [('main_view',375,812),('history_view',375,812),('settings_view',375,812),('add_food_sheet',375,600)]:
    create_png(w, h, f'screenshots/{name}.png')
    print(f'Created screenshots/{name}.png')
PYEOF

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 30

name: iOS Build & Test

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

jobs:
  build:
    name: Build iOS Project
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        
      - name: Show Xcode version
        run: xcodebuild -version
        
      - name: Show Swift version
        run: swift --version
      
      - name: Generate Xcode Project
        run: |
          # Check if XcodeGen is available, if not install it
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi
          # Generate the project from project.yml
          xcodegen generate
          
      - name: Verify project exists
        run: ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found, trying SPM..."
      
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      
      - name: Build HabitTracker (Xcode)
        if: hashFiles('*.xcodeproj')
        run: |
          xcodebuild build \
            -project project.xcodeproj \
            -scheme HabitTracker \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
            
      - name: Build HabitTracker (SPM fallback)
        if: '!hashFiles(''*.xcodeproj'')'
        run: |
          swift build -c debug --arch arm64

  test:
    name: Run Tests
    runs-on: macos-14
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      
      - name: Generate Xcode Project
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi
          xcodegen generate
      
      - name: Run Unit Tests (Xcode)
        if: hashFiles('*.xcodeproj')
        run: |
          xcodebuild test \
            -project project.xcodeproj \
            -scheme HabitTrackerTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath test_results/unit
            
      - name: Run Unit Tests (SPM)
        if: '!hashFiles(''*.xcodeproj'')'
        run: |
          swift test --arch arm64
            
      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test_results/
          retention-days: 7

  ui-test-screenshots:
    name: UI Tests & Screenshots
    runs-on: macos-14
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        
      - name: Generate Xcode Project
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi
          xcodegen generate
        
      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 16 Pro" || true
          xcrun simctl bootstatus "iPhone 16 Pro" -b
          
      - name: Run UI Tests
        if: hashFiles('*.xcodeproj')
        run: |
          mkdir -p screenshots
          
          xcodebuild test \
            -project project.xcodeproj \
            -scheme HabitTrackerUITests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath test_results/ui
            
      - name: Create App Screenshots
        if: hashFiles('*.xcodeproj')
        run: |
          mkdir -p screenshots
          # Create placeholder screenshots
          for name in main_view history_view settings_view add_food_sheet; do
            touch "screenshots/${name}.png"
          done
          ls -la screenshots/
          
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-screenshots
          path: screenshots/
          retention-days: 30

  check-status:
    name: Check GitHub Actions Status
    runs-on: macos-14
    needs: [build, test, ui-test-screenshots]
    if: always()
    
    steps:
      - name: Get Build Status
        run: |
          echo "=== Build Results ==="
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "UI Tests: ${{ needs.ui-test-screenshots.result }}"
          
      - name: Summary
        run: |
          echo "## ✅ Build & Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Tests & Screenshots | ${{ needs.ui-test-screenshots.result }} |" >> $GITHUB_STEP_SUMMARY
